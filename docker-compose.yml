version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: kubemanage-postgres
    restart: always
    environment:
      POSTGRES_DB: kubemanage
      POSTGRES_USER: kubemanage
      POSTGRES_PASSWORD: kubemanage123
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubemanage"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: kubemanage-redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  # KubeManage 平台
  kubemanage:
    build:
      context: .
      dockerfile: Dockerfile
    image: kubemanage:v1.0
    container_name: kubemanage-server
    restart: always
    environment:
      DATABASE_URL: "host=postgres user=kubemanage password=kubemanage123 dbname=kubemanage port=5432 sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      GIN_MODE: release
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
